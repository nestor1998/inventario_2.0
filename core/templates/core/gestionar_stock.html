{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid gestionar-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-11">
                <div class="gestionar-card">
                    <!-- Título del lado izquierdo -->
                    <div class="gestionar-sidebar text-white text-center">
                        <h1 class="gestionar-title">Gestionar<br>Stock</h1>
                    </div>

                    <!-- Contenido principal -->
                    <div class="gestionar-content">
                        {% if messages %}
                        <div class="container mt-3">
                            {% for message in messages %}
                            <div class="alert {% if message.tags == 'error' %}alert-danger{% elif message.tags == 'success' %}alert-success{% endif %} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                            {% endfor %}
                        </div>
                        {% endif %}

                        <div class="row g-4">
                            <!-- Aumentar Stock -->
                            <div class="col-md-6">
                                <div class="stock-form-container">
                                    <h3 class="text-center mb-4 aumentar-title">Aumentar Stock</h3>
                                    <form method="POST" action="{% url 'gestionar_stock' %}" id="add-form">
                                        {% csrf_token %}
                                        <div class="form-group">
                                            <input type="text" class="form-control form-control-lg mb-3 stock-input" 
                                                   name="barcode" placeholder="Ingrese código de barras..." {% if active_form != 'subtract' %}autofocus{% endif %}>
                                            <input type="hidden" name="action" value="add">
                                            <button type="submit" class="stock-button">
                                                <i class="fas fa-plus-circle me-2"></i>Aumentar
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>

                            <!-- Disminuir Stock -->
                            <div class="col-md-6">
                                <div class="stock-form-container">
                                    <h3 class="text-center mb-4 disminuir-title">Disminuir Stock</h3>
                                    <form method="POST" action="{% url 'gestionar_stock' %}" id="subtract-form">
                                        {% csrf_token %}
                                        <div class="form-group">
                                            <input type="text" class="form-control form-control-lg mb-3 stock-input" 
                                                   name="barcode" placeholder="Ingrese código de barras..." {% if active_form == 'subtract' %}autofocus{% endif %}>
                                            <input type="hidden" name="action" value="subtract">
                                            <button type="submit" class="stock-button">
                                                <i class="fas fa-minus-circle me-2"></i>Disminuir
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    const activeForm = urlParams.get('active_form');
    
    if (activeForm === 'subtract') {
        const subtractInput = document.querySelector('#subtract-form input[name="barcode"]');
        if (subtractInput) {
            subtractInput.focus();
        }
    } else {
        const addInput = document.querySelector('#add-form input[name="barcode"]');
        if (addInput) {
            addInput.focus();
        }
    }
});

document.querySelectorAll('input[name="barcode"]').forEach(input => {
    input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            this.closest('form').submit();
        }
    });
});
</script>
{% endblock %}
